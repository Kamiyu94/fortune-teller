<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔羅牌資料管理後台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1 id="adminTitle" style="cursor: pointer; user-select: none;" title="點擊 3 下開啟設定">🔮 塔羅牌資料管理</h1>
            <div class="actions">
                <button id="saveCloudBtn" class="btn-primary" style="display: none;">☁️ 寫入雲端</button>
                <div class="separator" id="cloudSeparator" style="display: none;"></div>
                <a href="check-data.html" target="_blank" class="btn-secondary" title="檢查線上檔案內容">🔍 檢查資料</a>
                <button id="exportBtn" class="btn-secondary">📥 下載檔案</button>
                <a href="index.html" class="btn-link">返回前台</a>
            </div>
        </header>



        <!-- Hidden Config Trigger (Backup) -->
        <button id="configBtn" style="display: none;"></button>

        <!-- Config Modal -->
        <div id="configModal" class="modal hidden">
            <div class="modal-content">
                <h2>⚙️ GitHub API 設定</h2>
                <p class="modal-desc">設定後可直接從後台更新網站資料。</p>

                <div class="form-group">
                    <label>GitHub Personal Access Token</label>
                    <input type="password" id="githubToken" class="form-control" placeholder="ghp_xxxxxxxxxxxx">
                    <small>需要 repo 權限</small>
                </div>

                <div class="form-group">
                    <label>GitHub Username</label>
                    <input type="text" id="githubUser" class="form-control" placeholder="username">
                </div>

                <div class="form-group">
                    <label>Repository Name</label>
                    <input type="text" id="githubRepo" class="form-control" placeholder="fortune-teller">
                </div>

                <div class="modal-actions">
                    <button id="saveConfigBtn" class="btn-primary">儲存設定</button>
                    <button id="closeConfigBtn" class="btn-secondary">關閉</button>
                </div>
            </div>
        </div>

        <!-- Review Modal -->
        <div id="reviewModal" class="modal hidden">
            <div class="modal-content review-modal-content">
                <h2>📋 確認修改內容</h2>
                <p class="modal-desc">以下是本次修訂的牌卡，請勾選您要同步到雲端的項目：</p>

                <div class="review-header">
                    <label class="checkbox-label">
                        <input type="checkbox" id="selectAllCheckbox" checked> 全選
                    </label>
                    <span id="changeCount">共 0 項修改</span>
                </div>

                <div class="review-list" id="reviewList">
                    <!-- JS populate items -->
                </div>

                <div class="modal-actions">
                    <button id="confirmUploadBtn" class="btn-primary">確認寫入雲端</button>
                    <button id="cancelUploadBtn" class="btn-secondary">取消</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <!-- 左側列表 -->
            <div class="card-list-panel">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜尋牌名...">
                </div>
                <div class="card-list" id="cardList">
                    <!-- JS 生成列表 -->
                </div>
            </div>

            <!-- 右側編輯區 -->
            <div class="edit-panel" id="editPanel">
                <div class="empty-state">請選擇左側卡牌開始編輯</div>

                <form id="editForm" class="edit-form hidden">
                    <div class="form-header">
                        <div class="form-header">
                            <div class="card-preview">
                                <h2 id="editCardName">卡牌名稱</h2>
                            </div>
                            <span class="card-id" id="editCardId">ID: 0</span>
                        </div>

                        <div class="form-group">
                            <label>卡牌圖像</label>
                            <div class="image-upload-container">
                                <div class="current-image" id="imagePreviewBox">
                                    <span class="placeholder-emoji" id="editSymbolDisplay">🎴</span>
                                    <img id="editImageDisplay" class="preview-img hidden" src="" alt="Card Image">
                                </div>
                                <div class="upload-controls">
                                    <input type="file" id="inputImage" accept="image/*" class="file-input">
                                    <div class="symbol-fallback">
                                        <label>或使用 Emoji 替代</label>
                                        <input type="text" id="inputSymbol" class="form-control symbol-input"
                                            placeholder="🎴">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>中文名稱</label>
                                <input type="text" id="inputName" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>英文名稱</label>
                                <input type="text" id="inputNameEn" class="form-control">
                            </div>
                        </div>

                        <div class="divider">⬆️ 正位含意 (Upright)</div>

                        <div class="form-group">
                            <label>關鍵字 (用逗號 , 分隔)</label>
                            <input type="text" id="inputUprightKeywords" class="form-control">
                        </div>

                        <div class="form-group">
                            <label>詳細解釋</label>
                            <textarea id="inputUprightDesc" class="form-control" rows="4"></textarea>
                        </div>

                        <div class="divider">⬇️ 逆位含意 (Reversed)</div>

                        <div class="form-group">
                            <label>關鍵字 (用逗號 , 分隔)</label>
                            <input type="text" id="inputReversedKeywords" class="form-control">
                        </div>

                        <div class="form-group">
                            <label>詳細解釋</label>
                            <textarea id="inputReversedDesc" class="form-control" rows="4"></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-save">💾 暫存修改</button>
                            <span class="save-hint">修改後請點擊右上角「寫入雲端」更新網站</span>
                        </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 原始資料 -->
    <script src="js/tarot-data.js"></script>
    <!-- 後台邏輯 -->
    <script src="js/admin.js"></script>
</body>

</html>
