<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔羅牌資料檢查</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ccc;
            font-family: monospace;
            padding: 20px;
            margin: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .title {
            color: #C5A059;
            margin: 0;
        }

        .btn {
            background: #444;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .btn:hover {
            background: #555;
        }

        #content {
            white-space: pre-wrap;
            word-break: break-all;
            background: #222;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            color: #a5d6a7;
        }

        .status {
            font-size: 14px;
            color: #888;
        }

        .error {
            color: #ff5252;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <h1 class="title">📄 tarot-data.js 檔案檢查</h1>
            <span class="status" id="status">正在讀取...</span>
        </div>
        <div>
            <a href="js/tarot-data.js" target="_blank" class="btn">下載原始檔案</a>
            <a href="admin.html" class="btn">返回後台</a>
        </div>
    </div>

    <div id="content">載入中...</div>

    <script>
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('content');

        // 1. 嘗試以純文字方式讀取檔案 (檢查格式)
        fetch('js/tarot-data.js?t=' + new Date().getTime()) // 加時間戳避免快取
            .then(response => {
                if (!response.ok) throw new Error('無法讀取檔案');
                statusEl.textContent = `檔案大小: ${response.headers.get('content-length') || '未知'} bytes`;
                return response.text();
            })
            .then(text => {
                contentEl.textContent = text;

                // 2. 嘗試解析看看是否為有效 JS/JSON
                try {
                    // 這裡我們用一個比較 hack 的方式檢查：
                    // 因為檔案內容是 "const TAROT_CARDS = [...];"
                    // 我們去掉宣告部分，嘗試 JSON.parse 陣列部分
                    const jsonPart = text.replace(/const\s+TAROT_CARDS\s*=\s*/, '').replace(/;\s*$/, '');
                    // 注意：如果檔案原本就不是 JSON 格式 (例如有單引號或註解)，這步會失敗是正常的
                    // 但透過顯示出來讓使用者看已足夠
                    statusEl.textContent += " | ✅ 讀取成功";
                } catch (e) {
                    // JS 檔案不一定是合法 JSON，所以這裡不報錯，僅顯示
                }
            })
            .catch(err => {
                statusEl.textContent = '❌讀取失敗';
                statusEl.classList.add('error');
                contentEl.textContent = err.message;
                contentEl.classList.add('error');
            });
    </script>
</body>

</html>
