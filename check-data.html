<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔羅牌資料庫檢查</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-panel: #252525;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --accent-gold: #C5A059;
            --accent-green: #81C784;
            --accent-purple: #CE93D8;
            --border-color: #404040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Serif TC', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .title-group h1 {
            color: var(--accent-gold);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .toolbar {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-input {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 4px;
            width: 250px;
            font-size: 0.9rem;
        }

        .btn {
            background: #444;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #555;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .data-status-bar {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #81C784;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .data-status-bar.error {
            background: rgba(244, 67, 54, 0.1);
            border-color: rgba(244, 67, 54, 0.3);
            color: #ef5350;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .card-item {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border-color: var(--accent-gold);
        }

        .card-header {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-symbol {
            font-size: 2rem;
            width: 40px;
            text-align: center;
        }

        .card-name-group {
            flex: 1;
        }

        .card-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent-gold);
        }

        .card-id {
            color: #666;
            font-size: 0.8rem;
            font-family: monospace;
        }

        .card-body {
            padding: 15px;
        }

        .meaning-section {
            margin-bottom: 15px;
        }

        .meaning-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .upright .section-title {
            color: var(--accent-green);
        }

        .reversed .section-title {
            color: var(--accent-purple);
        }

        .keywords-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
        }

        .desc-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #ddd;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Expand/Collapse logic could optionally handle full text */
    </style>
</head>

<body>
    <div class="header">
        <div class="title-group">
            <h1>🔮 塔羅牌資料庫檢查</h1>
            <div class="subtitle">目前的線上資料內容檢視</div>
        </div>
        <div class="toolbar">
            <input type="text" id="searchInput" class="search-input" placeholder="搜尋牌名、關鍵字...">
            <a href="admin.html" class="btn">返回後台</a>
        </div>
    </div>

    <div class="container">
        <div id="statusBox" class="data-status-bar">
            <span>讀取中...</span>
        </div>

        <div id="cardGrid" class="card-grid">
            <!-- Cards will be populated here -->
        </div>
    </div>

    <script>
        // Load the actual data file as a script to get TAROT_CARDS variable
        // We use a dynamic script tag with timestamp to bypass cache
        const script = document.createElement('script');
        script.src = 'js/tarot-data.js?t=' + new Date().getTime();

        script.onload = () => {
            if (typeof TAROT_CARDS !== 'undefined') {
                document.getElementById('statusBox').innerHTML = `
                    <span>✅ 資料讀取成功 (版本: ${new Date().toLocaleString()})</span>
                    <span>共 ${TAROT_CARDS.length} 張牌卡</span>
                `;
                renderCards(TAROT_CARDS);
            } else {
                showError('TAROT_CARDS 變數未定義，檔案可能格式錯誤。');
            }
        };

        script.onerror = () => {
            showError('無法載入 js/tarot-data.js，請確認檔案是否存在。');
        };

        document.body.appendChild(script);

        const searchInput = document.getElementById('searchInput');
        let currentData = [];

        function renderCards(data) {
            currentData = data;
            const grid = document.getElementById('cardGrid');
            const filter = searchInput.value.toLowerCase();

            grid.innerHTML = '';

            let count = 0;
            data.forEach(card => {
                // Search logic
                const searchTarget = `
                    ${card.name} ${card.nameEn} 
                    ${card.upright.keywords.join(' ')} 
                    ${card.reversed.keywords.join(' ')}
                `.toLowerCase();

                if (filter && !searchTarget.includes(filter)) return;

                const el = document.createElement('div');
                el.className = 'card-item';
                el.innerHTML = `
                    <div class="card-header">
                        <div class="card-symbol">${card.symbol || '🎴'}</div>
                        <div class="card-name-group">
                            <div class="card-name">${card.name}</div>
                            <div class="card-id">${card.nameEn} (ID: ${card.id})</div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="meaning-section upright">
                            <div class="section-title">⬆️ 正位</div>
                            <div class="keywords-tags">
                                ${card.upright.keywords.map(k => `<span class="tag">${k}</span>`).join('')}
                            </div>
                            <div class="desc-text" title="${card.upright.desc}">${card.upright.desc}</div>
                        </div>
                        <div class="meaning-section reversed">
                            <div class="section-title">⬇️ 逆位</div>
                            <div class="keywords-tags">
                                ${card.reversed.keywords.map(k => `<span class="tag">${k}</span>`).join('')}
                            </div>
                            <div class="desc-text" title="${card.reversed.desc}">${card.reversed.desc}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(el);
                count++;
            });

            if (count === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">沒有找到符合的牌卡</div>';
            }
        }

        function showError(msg) {
            const box = document.getElementById('statusBox');
            box.className = 'data-status-bar error';
            box.innerHTML = `<span>❌ ${msg}</span>`;
        }

        searchInput.addEventListener('input', () => {
            if (typeof TAROT_CARDS !== 'undefined') {
                renderCards(TAROT_CARDS);
            }
        });
    </script>
</body>

</html>
